name: Refresh Market Data

on:
  schedule:
    - cron: "0 6 * * *"  # Daily at 6 AM UTC
  workflow_dispatch:       # Manual trigger

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    outputs:
      data_changed: ${{ steps.commit.outputs.data_changed }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Python dependencies
        run: pip install akshare pandas

      - name: Fetch fresh market data
        env:
          KALSHI_API_KEY_ID: ${{ secrets.KALSHI_API_KEY_ID }}
          KALSHI_PRIVATE_KEY: ${{ secrets.KALSHI_PRIVATE_KEY }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
        run: npm run fetch-data

      - name: Commit and push if changed
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/
          if git diff --cached --quiet; then
            echo "No data changes — skipping commit."
            echo "data_changed=false" >> "$GITHUB_OUTPUT"
          else
            git stash
            git pull --rebase origin main
            git stash pop
            git add public/data/
            git commit -m "chore: refresh market data $(date -u +%Y-%m-%d)"
            git push
            echo "data_changed=true" >> "$GITHUB_OUTPUT"
          fi

  build-and-deploy:
    runs-on: ubuntu-latest
    needs: fetch
    if: needs.fetch.outputs.data_changed == 'true'
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          
      - run: npm ci
      - run: npm run build
      
      - name: Deploy to GitHub Pages (gh-pages branch)
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
          force_orphan: true
